<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | PropCRM</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js" integrity="sha512-AA1Bzp5Q0K1KanKKmvN/4d3IRKVlv9PYgwFPvm32nPO6QS8yH1HO7LbgB1pgiOxPtfeg5zEn2ba64MUcqJx6CA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    :root {
      --primary: #006ce4;
      --primary-dark: #0050a8;
      --accent: #f97316;
      --accent-dark: #ea580c;
      --bg-main: #f8fafc;
      --text-dark: #1e293b;
      --text-body: #475569;
      --border: #e2e8f0;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    /* BODY */
    body {
      min-height: 100vh;
      background: var(--bg-main);
      font-family: "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-body);
      overflow-x: hidden;
    }

    /* BRAND LOGO */
    .brand-logo {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 24px;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .brand-logo span {
      color: var(--accent);
    }

    /* LOGIN CARD */
    .login-card {
      background: #ffffff;
      width: 100%;
      max-width: 440px;
      padding: 40px 32px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .form-title {
      font-weight: 800;
      text-align: center;
      font-size: 1.3rem;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    
    .form-subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-body);
      margin-bottom: 28px;
    }

    /* INPUT STYLES */
    .form-control, .form-select {
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 0.95rem;
      color: var(--text-dark);
      font-family: "Poppins", sans-serif;
      box-shadow: none !important;
      transition: all 0.2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 108, 228, 0.1) !important;
    }
    
    .form-floating label {
      color: var(--text-body);
      font-size: 0.9rem;
      padding-left: 15px;
    }
    .form-label-top {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
      display: block;
    }
    .required {
      color: #ef4444;
      margin-left: 2px;
    }

    /* PASSWORD TOGGLE ICON */
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.2rem;
      z-index: 10;
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: var(--primary);
    }

    /* LOGIN BUTTON */
    .btn-login {
      width: 100%;
      font-weight: 800;
      font-size: 1rem;
      background: var(--primary);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      transition: 0.2s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 108, 228, 0.25);
    }
    .btn-login:disabled {
      background: #cbd5e1;
      transform: none;
      box-shadow: none;
    }

    /* LINKS */
    .bottom-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .bottom-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
    }
    .bottom-link a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* PROGRESSIVE FLOW UTILS */
    .auth-step { display: none; }
    .auth-step.active-step { display: block; animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .back-btn { background: none; border: none; color: var(--text-body); font-size: 0.85rem; font-weight: 600; padding: 0; margin-bottom: 15px; transition: 0.2s; }
    .back-btn:hover { color: var(--primary); }
    .otp-container { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
    .otp-input { width: 50px; height: 55px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 12px; border: 1.5px solid var(--border); color: var(--text-dark); background: white; }
    .otp-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0, 108, 228, 0.1); }


  </style>
</head>

<body>

  <div class="login-card">
    
    <div class="brand-logo">
      🏠 Prop<span>CRM</span>
    </div>

    <div class="form-title">Welcome Back</div>
    <div class="form-subtitle">Please sign in to your account to continue</div>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next|default:'' }}">

      <div id="step-1-email" class="auth-step active-step">
        <label class="form-label-top">Email Address <span class="required">*</span></label>
        <div class="form-floating mb-4">
          <input type="email" id="flow_email" class="form-control" placeholder="name@example.com" required>
          <label>Email Address</label>
        </div>
        <button type="button" class="btn-login" onclick="checkEmailExists(this)">Continue</button>
      </div>

      <div id="step-2-login" class="auth-step">
        <button type="button" class="back-btn" onclick="goToStepAuth('step-1-email')"><i class="bi bi-arrow-left"></i> Change Email</button>
        <label class="form-label-top">Password <span class="required">*</span></label>
        <div class="form-floating mb-4 position-relative">
          <input type="password" id="flow_password" class="form-control" style="padding-right: 45px;" placeholder="Enter Password">
          <label>Enter Password</label>
          <i class="bi bi-eye-slash password-toggle" id="togglePassword"></i>
        </div>
        <button type="button" class="btn-login" onclick="processProgLogin(this)">Sign In</button>
      </div>

      <div id="step-2-otp" class="auth-step">
        <button type="button" class="back-btn" onclick="goToStepAuth('step-1-email')"><i class="bi bi-arrow-left"></i> Change Email</button>
        <div class="form-subtitle text-start mb-2">We've sent a 4-digit verification code to <strong id="display_otp_email" class="text-dark"></strong>.</div>
        
        <div class="otp-container">
          <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
          <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
          <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
          <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, event)">
        </div>
        <button type="button" class="btn-login" onclick="verifyOTP(this)" style="background: var(--accent);">Verify OTP</button>
      </div>

      <div id="step-3-details" class="auth-step">
        <div class="form-subtitle text-start text-success fw-bold mb-3"><i class="bi bi-check-circle-fill"></i> Email Verified! Fill details to finalize account.</div>
        
        <label class="form-label-top">Full Name <span class="required">*</span></label>
        <div class="form-floating mb-3">
          <input type="text" id="flow_reg_name" class="form-control" placeholder="John Doe">
          <label>Full Name</label>
        </div>

        <label class="form-label-top">Mobile Number <span class="required">*</span></label>
        <div class="form-floating mb-3">
          <input type="tel" id="flow_reg_mobile" class="form-control" placeholder="10 Digits" maxlength="10">
          <label>Mobile Number</label>
        </div>

        <label class="form-label-top">Account Role <span class="required">*</span></label>
        <div class="form-floating mb-4">
          <select class="form-select" id="flow_reg_role">
            <option value="SelectRole" selected disabled>Choose a role...</option>
            <option value="Relationship Manager">Relationship Manager (RM)</option>
            <option value="Landlord">Landlord</option>
            <option value="Tenant">Tenant</option>
            <option value="Buyer">Buyer</option>
            <option value="Agent">Agent</option>
            <option value="Agency/Builder">Agencies / Builder</option>
            <option value="Vendor">Vendor</option>
          </select>
          <label>Select User Role</label>
        </div>
        <button type="button" class="btn-login" onclick="processProgRegistration(this)" style="background: #10b981;">Create Account & Sign In</button>
      </div>

      <div class="bottom-link">
        Need assistance? <a href="{% url 'index' %}">Return to Home</a>
      </div>
    </form>

  </div>

  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('flow_password');
        
        // Toggle the type attribute
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Toggle the icon
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
  </script>

<script>
    // Tab switching engine
    function goToStepAuth(stepId) {
        $('.auth-step').removeClass('active-step');
        $('#' + stepId).addClass('active-step');
    }

    // Auto-tab assistant for verification boxes
    function moveToNext(current, event) {
        if (current.value.length >= current.maxLength) {
            let next = $(current).next('.otp-input');
            if (next.length) next.focus();
        }
        if (event.key === "Backspace" && current.value.length === 0) {
            let prev = $(current).prev('.otp-input');
            if (prev.length) prev.focus();
        }
    }

    // STEP 1: Verify Profile Existence
    function checkEmailExists(_this) {
        let email = $('#flow_email').val().trim();
        if (!email) return swal({icon: "warning", title: "Missing Input", text: "Please enter your email address."});

        let btnText = _this.innerHTML;
        _this.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Checking...`;
        $(_this).prop("disabled", true);

        $.ajax({
            type: "POST",
            url: "{% url 'Check_Email_Api' %}", 
            data: { 'email': email },
            success: function(response) {
                $(_this).prop("disabled", false).html(btnText);
                if(response.exists) {
                    goToStepAuth('step-2-login');
                } else {
                    sendOTP(email);
                }
            },
            error: function() {
                $(_this).prop("disabled", false).html(btnText);
                swal({icon: "error", title: "Server Error", text: "Could not access profile records."});
            }
        });
    }

    // STEP 2B (Trigger): Request Verification Token
    function sendOTP(email) {
        $('#display_otp_email').text(email);
        goToStepAuth('step-2-otp'); 
        $.ajax({
            type: "POST",
            url: "{% url 'Send_Otp_Api' %}",
            data: { 'email': email }
        });
    }

    // STEP 2A (Execution): Password Login Path
    function processProgLogin(_this) {
        let email = $('#flow_email').val();
        let password = $('#flow_password').val();
        if (!password) return swal({icon: "warning", title: "Missing Input", text: "Please enter your password."});

        let btnText = _this.innerHTML;
        _this.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Verifying...`;
        $(_this).prop("disabled", true);

        $.ajax({
            type: "POST",
            url: "{% url 'Prop_Login_Api' %}", 
            data: { 'email': email, 'password': password },
            success: function(response) {
                if(response.status == '1' || response.status == 'success') {
                    // Match original window execution behavior
                    let userRole = response.user_role;
                    if (userRole === "Relationship Manager") {
                        window.open(response.redirect_url || "{% url 'index' %}", '_blank');
                        window.location.href = "{% url 'index' %}";
                    } else {
                        window.location.href = response.redirect_url || "{% url 'index' %}";
                    }
                } else {
                    $(_this).prop("disabled", false).html(btnText);
                    swal({icon: "error", title: "Authentication Failed", text: response.msg || "Invalid password."});
                }
            },
            error: function() {
                $(_this).prop("disabled", false).html(btnText);
                swal({icon: "error", title: "Server Error", text: "Connection dropped during login handling."});
            }
        });
    }

    // STEP 2B (Execution): Code Validation Path
    function verifyOTP(_this) {
        let otp = "";
        $('.otp-input').each(function() { otp += $(this).val(); });
        if(otp.length < 4) return swal({icon: "warning", title: "Incomplete Code", text: "Please supply the entire token."});

        let btnText = _this.innerHTML;
        _this.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Checking...`;
        $(_this).prop("disabled", true);

        $.ajax({
            type: "POST",
            url: "{% url 'Verify_Otp_Api' %}", 
            data: { 'email': $('#flow_email').val(), 'otp': otp },
            success: function(response) {
                $(_this).prop("disabled", false).html(btnText);
                if(response.valid) {
                    goToStepAuth('step-3-details');
                } else {
                    swal({icon: "error", title: "Validation Failed", text: "Token code mismatch. Check again."});
                }
            }
        });
    }

    // STEP 3 (Execution): Account Onboarding Path
    function processProgRegistration(_this) {
        let email = $('#flow_email').val();
        let name = $('#flow_reg_name').val().trim();
        let mobile = $('#flow_reg_mobile').val().trim();
        let role = $('#flow_reg_role').val();

        if(!name || !mobile || role === "SelectRole" || !role) {
            return swal({icon: "warning", title: "Missing Details", text: "Please complete all fields to sign up."});
        }

        let btnText = _this.innerHTML;
        _this.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Provisioning...`;
        $(_this).prop("disabled", true);

        $.ajax({
            type: "POST",
            url: "{% url 'Prop_Register_Api' %}", 
            data: { 'email': email, 'name': name, 'mobile': mobile, 'role': role},
            success: function(response) {
                if(response.status == '1' || response.status == 'success') {
                    if (role === "Relationship Manager") {
                        window.open(response.redirect_url || "{% url 'index' %}", '_blank');
                        window.location.href = "{% url 'index' %}";
                    } else {
                        window.location.href = response.redirect_url || "{% url 'index' %}";
                    }
                } else {
                    $(_this).prop("disabled", false).html(btnText);
                    swal({icon: "error", title: "Profile Creation Denied", text: response.msg || "Registration rejected."});
                }
            },
            error: function() {
                $(_this).prop("disabled", false).html(btnText);
                swal({icon: "error", title: "Server Error", text: "Onboarding tracking encountered a failure."});
            }
        });
    }
  </script>

</body>
</html>
