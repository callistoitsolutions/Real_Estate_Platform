<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | PropCRM</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js" integrity="sha512-AA1Bzp5Q0K1KanKKmvN/4d3IRKVlv9PYgwFPvm32nPO6QS8yH1HO7LbgB1pgiOxPtfeg5zEn2ba64MUcqJx6CA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    :root {
      --primary: #006ce4;
      --primary-dark: #0050a8;
      --accent: #f97316;
      --accent-dark: #ea580c;
      --bg-main: #f8fafc;
      --text-dark: #1e293b;
      --text-body: #475569;
      --border: #e2e8f0;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    /* BODY */
    body {
      min-height: 100vh;
      background: var(--bg-main);
      font-family: "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-body);
      overflow-x: hidden;
    }

    /* BRAND LOGO */
    .brand-logo {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 24px;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .brand-logo span {
      color: var(--accent);
    }

    /* LOGIN CARD */
    .login-card {
      background: #ffffff;
      width: 100%;
      max-width: 440px;
      padding: 40px 32px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .form-title {
      font-weight: 800;
      text-align: center;
      font-size: 1.3rem;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    
    .form-subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-body);
      margin-bottom: 28px;
    }

    /* INPUT STYLES */
    .form-control, .form-select {
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 0.95rem;
      color: var(--text-dark);
      font-family: "Poppins", sans-serif;
      box-shadow: none !important;
      transition: all 0.2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 108, 228, 0.1) !important;
    }
    
    .form-floating label {
      color: var(--text-body);
      font-size: 0.9rem;
      padding-left: 15px;
    }
    .form-label-top {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
      display: block;
    }
    .required {
      color: #ef4444;
      margin-left: 2px;
    }

    /* PASSWORD TOGGLE ICON */
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.2rem;
      z-index: 10;
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: var(--primary);
    }

    /* LOGIN BUTTON */
    .btn-login {
      width: 100%;
      font-weight: 800;
      font-size: 1rem;
      background: var(--primary);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      transition: 0.2s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 108, 228, 0.25);
    }
    .btn-login:disabled {
      background: #cbd5e1;
      transform: none;
      box-shadow: none;
    }

    /* LINKS */
    .bottom-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .bottom-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
    }
    .bottom-link a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-card">
    
    <div class="brand-logo">
      🏠 Prop<span>CRM</span>
    </div>

    <div class="form-title">Welcome Back</div>
    <div class="form-subtitle">Please sign in to your account to continue</div>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next|default:'' }}">

      <label class="form-label-top">
        Email Address/Phone Number <span class="required">*</span>
      </label>
      <div class="form-floating mb-3">
        <input name="user_identifier" id="user_identifier" type="text" class="form-control" placeholder="Enter Email Address/Phone Number" required>
        <label>Email Address/Phone Number</label>
      </div>

      <label class="form-label-top">
        Password <span class="required">*</span>
      </label>
      <div class="form-floating mb-3 position-relative">
        <input name="user_password" id="user_password" type="password" class="form-control" style="padding-right: 45px;" placeholder="Enter Password" required>
        <label>Enter Password</label>
        <i class="bi bi-eye-slash password-toggle" id="togglePassword"></i>
      </div>

      <label class="form-label-top">
        Account Role <span class="required">*</span>
      </label>
      <div class="form-floating mb-4">
        <select name="user_role" class="form-select" id="user_role" required>
          <option value="SelectRole" selected disabled>Choose a role...</option>
          <option value="Relationship Manager">Relationship Manager (RM)</option>
          <option value="Landlord">Landlord</option>
          <option value="Tenant">Tenant</option>
          <option value="Buyer">Buyer</option>
          <option value="Agent">Agent</option>
          <option value="Agency/Builder">Agencies / Builder</option>
          <option value="Vendor">Vendor</option>
        </select>
        <label for="user_role">Select User Role</label>
      </div>

      <button type="button" class="btn-login" onclick="User_Login(this)">Sign In</button>

      <div class="bottom-link">
        New to PropCRM? <a href="{% url 'signup' %}">Create an Account</a>
      </div>
    </form>

  </div>

  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('user_password');
        
        // Toggle the type attribute
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Toggle the icon
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
  </script>

  <script>
    function User_Login(_this){
        var user_identifier = $("#user_identifier").val();
        var user_password = $("#user_password").val();
        var user_role = $("#user_role").val();
        
        if (user_identifier == "") {
            swal({icon: "warning", title: "Missing Input", text: "Please Enter Email Address/Phone Number"});
        }
        else if(user_password == "") {
            swal({icon: "warning", title: "Missing Input", text: "Please Enter Password"});
        }
        else if(user_role == "SelectRole" || user_role == null) {
            swal({icon: "warning", title: "Missing Input", text: "Please Select a Role"});
        }
        else {
            _this.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Signing in...`;
            $(_this).prop("disabled", true);
            
            $.ajax({
                method:"POST",
                url : "{% url 'login' %}",
                contentType: "application/json",
                data:JSON.stringify({
                "user_identifier":user_identifier,
                "user_password":user_password,
                "user_role":user_role,
                }),
                success : function (response){
                $(_this).prop("disabled", false);
                    _this.innerHTML = `Sign In`;
                    if (response.status == '1'){
                        
                          // If browser blocks popup, fallback to same tab
                          window.location.href = "{% url 'index' %}";
                  }
                else
                {
                    swal( 
                    {
                        content: {
                            element: "div",
                            attributes: {
                                innerHTML: '<span style="font-weight:bold; color:#ef4444;font-size:16px;">' + response.msg + '</span>'
                            }
                        },
                        icon: "error",
                        title: "Login Failed",
                        closeOnClickOutside: false,
                    }) 
                }
    
                }
            });
        }
    }
  </script>

</body>
</html>
