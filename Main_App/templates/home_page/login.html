<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Rentify</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js" integrity="sha512-AA1Bzp5Q0K1KanKKmvN/4d3IRKVlv9PYgwFPvm32nPO6QS8yH1HO7LbgB1pgiOxPtfeg5zEn2ba64MUcqJx6CA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    :root {
      --bg-dark: #0d1117;
      --glass: rgba(255, 255, 255, 0.10);
      --primary: #4f73ff;
      --primary-glow: #7e95ff;
      --text-light: #f3f4f6;
      --text-muted: #a0a6b6;
    }

    /* BODY — no scroll */
    body {
      min-height: 100vh;
      background: var(--bg-dark);
      font-family: "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-light);
      overflow-x: hidden;
    }

    /* LOGIN CARD — AUTO HEIGHT, NO SCROLL */
    .login-card {
      background: var(--glass);
      backdrop-filter: blur(18px);
      width: 100%;
      max-width: 430px;
      padding: 25px 28px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* White fields + black text */
    .form-control {
      background: white !important;
      color: #000 !important;
      border: 1px solid #ccc;
    }

    .form-floating label {
      color: #444 !important;
    }

    /* Title */
    .form-title {
      font-weight: 800;
      text-align: center;
      font-size: 1.7rem;
      margin-bottom: 15px;
      background: linear-gradient(90deg, #4f73ff, #92a5ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    /* Role Buttons */
    .role-select {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .role-btn {
      flex: 1;
      padding: 8px 0;
      margin: 0 4px;
      text-align: center;
      font-weight: 600;
      border-radius: 18px;
      border: 1px solid var(--primary);
      cursor: pointer;
      color: white;
    }

    .role-btn.active,
    .role-btn:hover {
      background: var(--primary);
    }

    /* CAPTCHA FIX — compact */
    .captcha-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .captcha-img {
      height: 40px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .captcha-input {
      width: 130px;
      height: 40px;
      padding: 8px;
      background: white !important;
      color: #000 !important;
      border: 1px solid #ccc;
    }

    /* Login button */
    .btn-login {
      width: 100%;
      font-weight: 700;
      background: var(--primary);
      border: none;
      padding: 12px;
      border-radius: 12px;
      color: white;
    }

    .btn-login:hover {
      background: var(--primary-glow);
    }
  </style>
</head>

<body>

  <div class="login-card">

    <div class="form-title">Login to Rentify</div>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next|default:'' }}">

      <!-- ROLE -->
      {% comment %} <div class="role-select">
        <input type="radio" name="role" id="r1" value="landlord" class="d-none" {% if data.role=='landlord' %}checked{%
          endif %}>
        <label for="r1" class="role-btn {% if data.role == 'landlord' %}active{% endif %}">Owner</label>

        <input type="radio" name="role" id="r2" value="broker" class="d-none" {% if data.role=='broker' %}checked{%
          endif %}>
        <label for="r2" class="role-btn {% if data.role == 'broker' %}active{% endif %}">Broker</label>

        <input type="radio" name="role" id="r3" value="tenant" class="d-none" {% if data.role=='tenant' or not data.role
          %}checked{% endif %}>
        <label for="r3" class="role-btn {% if data.role == 'tenant' or not data.role %}active{% endif %}">Tenant</label>
      </div> {% endcomment %}

      <!-- EMAIL -->
      <label class="form-label">
        Email Address <span class="required" style="color:red;">*</span>
      </label>
      <div class="form-floating mb-3">
        <input name="user_email" id="user_email" type="email" class="form-control" placeholder="Enter Email Address" required>
        <label>Email Address</label>
      </div>

      <!-- PASSWORD -->
      <label class="form-label">
        Password <span class="required" style="color:red;">*</span>
      </label>
      <div class="form-floating mb-3">
        <input name="user_password" id="user_password" type="password" class="form-control" placeholder="Enter Password" required>
        <label>Password</label>
      </div>

      <label class="form-label">
        Role <span class="required" style="color:red;">*</span>
      </label>
      <div class="form-floating mb-3">
        <select name="user_role" class="form-select" id="user_role" required>
          <option value="SelectRole" selected disabled>Choose a role...</option>
          <option value="Relationship Manager">Relationship Manager(RM)</option>
          <option value="Landlord">Landlord</option>
          <option value="Tenant">Tenant</option>
          <option value="Buyer">Buyer</option>
          <option value="Agent">Agent</option>
          <option value="Agency/Builder">Agencies/Builder</option>
          <option value="Vendor">Vendor</option>
        </select>
        <label for="user_role">Select User Role</label>
      </div>

      <!-- CAPTCHA (compact — NO EXTRA HEIGHT) -->
      {% comment %} <label class="fw-semibold mb-1 d-block text-center">Enter Captcha</label>
      <div class="captcha-box">
        <img src="{{ captcha_img }}" class="captcha-img">
        <input name="captcha" class="captcha-input" placeholder="Enter" required>
      </div>
      <input type="hidden" name="captcha_key" value="{{ captcha_key }}"> {% endcomment %}

      <!-- Login -->
      <button type="button" class="btn-login mt-2" onclick="User_Login(this)">Login</button>

      <div class="text-center mt-3">
        <a href="{% url 'signup' %}?next={{ next|default:'' }}">New to Rentify? Create Account</a>
      </div>
    </form>

    <hr class="text-muted my-3">

    {% comment %} <div class="text-center pb-2">
      <p class="small text-muted">Or continue with</p>
      <a class="btn btn-outline-light rounded-pill px-4 py-2" href="#">
        <i class="bi bi-google"></i> Google
      </a> {% endcomment %}
    </div>

  </div>

  <script>
    const buttons = document.querySelectorAll(".role-btn");
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
  </script>

</body>

{% comment %} Ajax and Jquery for user login {% endcomment %}


      <script>
        function User_Login(_this){
            var user_email = $("#user_email").val();
            var user_password = $("#user_password").val();
            var user_role = $("#user_role").val();
            if (user_email == "")
            {
                alert("Please Enter Email Address");
            }
            else if(user_password == "")
            {
                alert("Please Enter Password");
            }
            else if(user_role == "SelectRole")
            {
                alert("Please Select Role");
            }
             else
            {
                _this.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Loading...`;
                
                $.ajax({
                    method:"POST",
                    url : "{% url 'login' %}",
                    contentType: "application/json",
                    data:JSON.stringify({
                    "user_email":user_email,
                    "user_password":user_password,
                    "user_role":user_role,
                    }),
                    success : function (response){
                    $(_this).prop("disabled", false);
                        _this.innerHTML = `Login`;
                        if (response.status == '1'){
                            var win = window.open(response.redirect_url, '_blank');
                          if (win) {
                              win.focus();
                          } else {
                              // If browser blocks popup, fallback to same tab
                              window.location.href = response.redirect_url;
                          }
                      }
                    else
                    {
                        swal( 
                        {
                            content: {
                                element: "div",
                                attributes: {
                                    innerHTML: '<span style="font-weight:bold; color:red;font-size:20px;">' + response.msg + '</span>'
                                }
                            },

                            icon: "warning",
                            closeOnClickOutside: false,
                        }) 
                    }
        
                    }
                });
            }
        }
      </script>


</html>
