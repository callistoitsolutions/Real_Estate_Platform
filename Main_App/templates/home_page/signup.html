<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | PropCRM</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js" integrity="sha512-AA1Bzp5Q0K1KanKKmvN/4d3IRKVlv9PYgwFPvm32nPO6QS8yH1HO7LbgB1pgiOxPtfeg5zEn2ba64MUcqJx6CA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    :root {
      --primary: #006ce4;
      --primary-dark: #0050a8;
      --accent: #f97316;
      --accent-dark: #ea580c;
      --bg-main: #f8fafc;
      --text-dark: #1e293b;
      --text-body: #475569;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    /* BODY */
    body {
      min-height: 100vh;
      background: var(--bg-main);
      font-family: "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-body);
      overflow-x: hidden;
    }

    /* BRAND LOGO */
    .brand-logo {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary);
      text-align: center;
      margin-bottom: 24px;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .brand-logo span {
      color: var(--accent);
    }

    /* SIGNUP CARD */
    .signup-card {
      background: #ffffff;
      width: 100%;
      max-width: 540px; /* Widened slightly to fit the grid nicely */
      padding: 40px 32px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .form-title {
      font-weight: 800;
      text-align: center;
      font-size: 1.3rem;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    
    .form-subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-body);
      margin-bottom: 28px;
    }

    /* ROLE SELECTION (Grid of Pills) */
    .role-selection {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    
    .role-btn {
      padding: 10px 4px;
      text-align: center;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-body);
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .role-btn i {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }
    
    .role-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(0, 108, 228, 0.04);
    }

    /* Hidden Radio Inputs */
    .role-input {
      display: none;
    }

    /* Active State based on hidden radio checked */
    .role-input:checked + .role-btn {
      background: rgba(0, 108, 228, 0.1);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* INPUT STYLES */
    .form-control {
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 0.95rem;
      color: var(--text-dark);
      font-family: "Poppins", sans-serif;
      box-shadow: none !important;
      transition: all 0.2s;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 108, 228, 0.1) !important;
    }
    
    .form-floating label {
      color: var(--text-body);
      font-size: 0.9rem;
      padding-left: 15px;
    }
    .form-label-top {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
      display: block;
    }
    .required {
      color: #ef4444;
      margin-left: 2px;
    }

    /* PASSWORD TOGGLE ICON */
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.2rem;
      z-index: 10;
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: var(--primary);
    }

    /* TERMS CHECKBOX */
    .terms-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
    }
    .terms-wrap input {
      margin-top: 4px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }
    .terms-wrap label {
      font-size: 0.8rem;
      color: var(--text-body);
      line-height: 1.5;
      cursor: pointer;
    }
    .terms-wrap a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
    .terms-wrap a:hover {
      text-decoration: underline;
    }

    /* SIGNUP BUTTON */
    .btn-signup {
      width: 100%;
      font-weight: 800;
      font-size: 1rem;
      background: var(--primary);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      transition: 0.2s;
    }
    .btn-signup:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 108, 228, 0.25);
    }

    /* LINKS */
    .bottom-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .bottom-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
    }
    .bottom-link a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .role-selection {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <div class="signup-card">
    
    <div class="brand-logo">
      🏠 Prop<span>CRM</span>
    </div>

    <div class="form-title">Create an Account</div>
    <div class="form-subtitle">Join PropCRM to start managing properties</div>

    <form>
      {% csrf_token %}
      <input type="hidden" name="next" >

      <label class="form-label-top">I am a... <span class="required">*</span></label>
      <div class="role-selection">
        
        <label>
          <input class="role-input" type="radio" name="role" value="Landlord">
          <div class="role-btn"><i class="bi bi-house-door"></i> Landlord</div>
        </label>
        
        <label>
          <input class="role-input" type="radio" name="role" value="Tenant" >
          <div class="role-btn"><i class="bi bi-person"></i> Tenant</div>
        </label>
        
        <label>
          <input class="role-input" type="radio" name="role" value="Buyer" >
          <div class="role-btn"><i class="bi bi-key"></i> Buyer</div>
        </label>

        <label>
          <input class="role-input" type="radio" name="role" value="Agent" >
          <div class="role-btn"><i class="bi bi-briefcase"></i> Agent</div>
        </label>

        <label>
          <input class="role-input" type="radio" name="role" value="Agency/Builder" >
          <div class="role-btn"><i class="bi bi-buildings"></i> Agency/Builder</div>
        </label>

        <label>
          <input class="role-input" type="radio" name="role" value="Vendor" >
          <div class="role-btn"><i class="bi bi-tools"></i> Vendor</div>
        </label>
        
      </div>

      <label class="form-label-top">
        Full Name <span class="required">*</span>
      </label>
      <div class="form-floating mb-3">
        <input name="full_name" type="text" class="form-control" placeholder="Enter Full Name" required >
        <label>John Doe</label>
      </div>

      <label class="form-label-top">
        Email Address <span class="required">*</span>
      </label>
      <div class="form-floating mb-3">
        <input name="email" type="email" class="form-control" placeholder="Enter Email Address" required >
        <label>name@example.com</label>
      </div>

      <label class="form-label-top">
        Mobile Number <span class="required">*</span>
      </label>
      <div class="form-floating mb-3">
        <input name="mobile_number" type="tel" class="form-control" placeholder="Enter Mobile Number" required maxlength=10>
        <label>+91 98765 43210</label>
      </div>

      <label class="form-label-top">
        Password <span class="required">*</span>
      </label>
      <div class="form-floating mb-4 position-relative">
        <input name="password" id="user_password" type="password" class="form-control" style="padding-right: 45px;" placeholder="Create Password" required>
        <label>Create a secure password</label>
        <i class="bi bi-eye-slash password-toggle" id="togglePassword"></i>
      </div>

      <div class="terms-wrap">
        <input type="checkbox" name="agree_terms" id="termsCheck" required>
        <label for="termsCheck">
          I agree to PropCRM's <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a>.
        </label>
      </div>

      <button type="button" class="btn-signup" onclick="Create_Account(this)">Create Account</button>

      <div class="bottom-link">
        Already have an account? <a href="{% url 'login' %}">Sign In</a>
      </div>
    </form>

  </div>

  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('user_password');
        
        // Toggle the type attribute
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Toggle the icon
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>
  function Create_Account(_this) {
    // 1. Gather all form fields
    var role = $("input[name='role']:checked").val();
    var full_name = $("input[name='full_name']").val().trim();
    var email = $("input[name='email']").val().trim();
    var mobile_number = $("input[name='mobile_number']").val().trim();
    var password = $("#user_password").val();
    var agree_terms = $("#termsCheck").is(":checked");

    // 2. Regular Expressions for Validation
    // Basic email pattern: something@something.something
    var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    // 10-digit mobile number pattern (Indian standard starting with 6,7,8,9)
    var mobileRegex = /^[6-9]\d{9}$/;

    // 3. Frontend Validation
    if (!role) {
      swal("Warning", "Please select your account role.", "warning");
      return;
    }
    if (full_name === "") {
      swal("Warning", "Please enter your full name.", "warning");
      return;
    }
    
    // Email Validation
    if (email === "") {
      swal("Warning", "Please enter your email address.", "warning");
      return;
    } else if (!emailRegex.test(email)) {
      swal("Invalid Email", "Please enter a valid email address (e.g., name@example.com).", "warning");
      return;
    }

    // Mobile Number Validation
    if (mobile_number === "") {
      swal("Warning", "Please enter your mobile number.", "warning");
      return;
    }

    if (password === "") {
      swal("Warning", "Please create a password.", "warning");
      return;
    } 

    if (!agree_terms) {
      swal("Warning", "You must agree to the Terms and Conditions to proceed.", "warning");
      return;
    }

    // 4. Create FormData Object
    var fd = new FormData();
    fd.append('id', '');
    fd.append('user_role', role);
    fd.append('user_name', full_name);
    fd.append('user_email', email);
    fd.append('user_phone', mobile_number);
    fd.append('user_password', password);


   
    // 5. Update Button State to Loading
    $(_this).prop("disabled", true).html(`<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Creating Account...`);

    // 6. Send AJAX POST Request
    $.ajax({
      method: "POST",
      url: "{% url 'User_Ajax' %}", // Update to your actual Django URL name
      data: fd,
      processData: false,
      contentType: false,
      success: function (response) {
        // Reset Button State
        $(_this).prop("disabled", false).html(`Create Account`);
        
        // 7. Handle Backend Response
        if (response.status == '1' || response.status == 'success') {
          swal("Success!", response.msg || "Account created successfully!", "success").then(() => {
            window.location.href = response.redirect_url || "{% url 'login' %}"; 
          });
        } else {
          swal("Registration Failed", response.msg || "An error occurred. Please try again.", "error");
        }
      },
      error: function (xhr, status, error) {
        // Reset Button State on Server Error
        $(_this).prop("disabled", false).html(`Create Account`);
        swal("Server Error", "Could not connect to the server. Please try again later.", "error");
      }
    });
  }
</script>

</body> 
</html>
