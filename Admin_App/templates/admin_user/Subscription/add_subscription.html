{% include "admin_user/admin_header.html" %}
{% load static %}

<style>
  :root {
    --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    --sidebar-width: 280px;
    --topbar-height: 70px;
  }

  /* --- Original Layout Styles --- */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); overflow-x: hidden; min-height: 100vh; }
  .main-content { margin-left: var(--sidebar-width); margin-top: var(--topbar-height); padding: 30px; transition: all 0.3s ease; }
  .form-container { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); }
  .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
  
  /* --- Keeping Your Exact Back Button CSS --- */
  .btn-back {
    background: #f8f9fa;
    color: #2d3748;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn-back:hover {
    background: var(--dark-gradient);
    color: white;
    transform: translateY(-2px);
  }

  /* --- Multi-step Horizontal Tracker --- */
  .step-progress-bar { display: flex; justify-content: space-between; align-items: center; margin: 0 auto 40px; position: relative; max-width: 600px; }
  .step-progress-bar::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: #e9ecef; transform: translateY(-50%); z-index: 1; }
  .step-indicator { position: relative; z-index: 2; width: 45px; height: 45px; background: white; border: 3px solid #e9ecef; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #adb5bd; transition: all 0.3s ease; }
  .step-indicator.active { border-color: #667eea; color: #667eea; transform: scale(1.1); box-shadow: 0 0 15px rgba(102, 126, 234, 0.2); }
  .step-indicator.completed { background: #667eea; border-color: #667eea; color: white; }
  
  /* --- Step Display Logic --- */
  .form-step { display: none; }
  .form-step.active { display: block; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- Section & Control Styling --- */
  .section-header { background: var(--primary-gradient); color: white; padding: 15px 20px; border-radius: 12px 12px 0 0; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
  .section-body { background: #f8f9fa; padding: 25px; border-radius: 0 0 12px 12px; border: 2px solid #e9ecef; border-top: none; }
  .form-label { font-weight: 600; color: #2d3748; margin-bottom: 8px; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
  .form-control { border: 2px solid #e9ecef; border-radius: 12px; padding: 12px 15px; font-size: 0.95rem; transition: all 0.3s ease; width: 100%; }

  /* --- Button Alignment Fix --- */
  .form-footer { margin-top: 30px; padding-top: 25px; border-top: 2px solid #f0f0f0; display: flex; align-items: center; }
  
  /* MARGIN-LEFT: AUTO IS THE MAGIC FIX THAT PUSHES THESE TO THE RIGHT */
  .btn-submit, .btn-next { 
      background: var(--primary-gradient); 
      color: white; 
      padding: 12px 35px; 
      border-radius: 12px; 
      border: none; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      margin-left: auto; 
  }
  .btn-submit:hover, .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }
  
  .btn-prev { 
      background: #f8f9fa; 
      color: #2d3748; 
      padding: 12px 35px; 
      border-radius: 12px; 
      border: 2px solid #e9ecef; 
      font-weight: 600; 
      cursor: pointer; 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
  }
  .btn-prev:hover { background: #e9ecef; }

  .form-title { font-size: 1.5rem; font-weight: 700; color: #2d3748; display: flex; align-items: center; gap: 12px; }
  .form-title i { width: 45px; height: 45px; background: var(--primary-gradient); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  
</style>

<div class="main-content">
  <div class="form-container">
    <div class="form-header">
      <div class="form-title"><i class="fas fa-edit"></i> Add Subscriptions</div>
      <button class="btn-back" onclick="history.back();"><i class="fas fa-arrow-left"></i> Back to List</button>
    </div>

    <!-- The exact step progress bar you provided -->
    <div class="step-progress-bar">
      <div class="step-indicator active" id="ind-1">1</div>
      <div class="step-indicator" id="ind-2">2</div>
      <div class="step-indicator" id="ind-3">3</div>
    </div>

    <form method="POST"  id="multistep-subscription-form">

      <!-- STEP 1 -->
      <div class="form-step active" id="step-1">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-info-circle"></i> Step 1: Basic Details</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4 mt-2">
                <label class="form-label">Package Name <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="package_name" name="package_name" placeholder="Enter Package Name" required>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Plan Type <span style="color:red;">*</span></label>
                <select class="form-control" id="plan_type" name="plan_type" required>
                  <option value="" selected disabled>Select a plan.</option>
                  <option value="Basic Plan">Basic Plan</option>
                  <option value="Standard Plan">Standard Plan</option>
                  <option value="Premium Plan">Premium Plan</option>
                </select>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Plan Duration <span style="color:red;">*</span></label>
                <select class="form-control" id="plan_duration" name="plan_duration" required>
                  <option value="" selected disabled>Select a duration</option>
                  <option value="1-month">1 month</option>
                  <option value="3-months">3 months</option>
                  <option value="6-months">6 months</option>
                  <option value="12-months">12 months</option>
                </select>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Plan For <span style="color:red;">*</span></label>
                <select class="form-control" id="plan_for" name="plan_for" required>
                  <option value="" selected disabled>Plan For</option>
                  <option value="Landlords">Landlords</option>
                  <option value="Agents/Agency">Agents/Agency</option>
                  <option value="Vendors">Vendors</option>
                  <option value="Tenants/Buyers">Tenants/Buyers</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="form-step" id="step-2">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-money-bill-wave"></i> Step 2: Pricing & Limits</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4 mt-2">
                <label class="form-label">Base Price <span style="color:red;">*</span></label>
                <input type="number" class="form-control" id="plan_base_price" name="plan_base_price" placeholder="Enter Base Price" required>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Offer Price <span style="color:red;">*</span></label>
                <input type="number" class="form-control" id="plan_offer_price" name="plan_offer_price" placeholder="Enter Offer Price" required>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Discount Percentage <span style="color:red;">*</span></label>
                <input type="number" class="form-control" id="plan_discount" name="plan_discount" placeholder="Enter Discount Percentage" required>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Maxlistings / Enquiries <span style="color:red;">*</span></label>
                <input type="number" class="form-control" id="plan_max_listings" name="plan_max_listings" placeholder="Enter Maxlistings/Enquiries" required>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="form-step" id="step-3">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-calendar-alt"></i> Step 3: Duration & Details</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-6 mt-2">
                <label class="form-label">Offer Start Date <span style="color:red;">*</span></label>
                <input type="date" class="form-control" id="plan_offer_start_date" name="plan_offer_start_date" required>
              </div>
              <div class="col-md-6 mt-2">
                <label class="form-label">Offer End Date <span style="color:red;">*</span></label>
                <input type="date" class="form-control" id="plan_offer_end_date" name="plan_offer_end_date" required>
              </div>
              <div class="col-md-12 mt-4">
                <label class="form-label">Plan Description <span style="color:red;">*</span></label>
                <!-- Removed required attribute here if using CKEditor as it can conflict with standard validation -->
                <textarea class="form-control" placeholder="Enter Plan Description" id="plan_desc" name="plan_desc"></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="btn-prev" id="prevBtn" onclick="changeStep(-1)" style="display:none;"><i class="fas fa-arrow-left"></i> Previous</button>
        <button type="button" class="btn-next" id="nextBtn" onclick="changeStep(1)">Next Step <i class="fas fa-arrow-right"></i></button>
        <button type="button" class="btn-submit" id="submitBtn" onclick="Add_Subscription(this)" style="display:none;"><i class="fas fa-plus"></i> Add Subscription</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert/dist/sweetalert.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- CKEditor Initialization -->
<script>

    $("#Subscriptions").addClass("active");

    window.onload = function () {
        if (typeof CKEDITOR !== 'undefined') {
            if (CKEDITOR.instances.plan_desc) {
                CKEDITOR.instances.plan_desc.destroy();
            }
            CKEDITOR.replace('plan_desc');
        }
    };
</script>



<!-- Clean Step Navigation Logic -->
<script>

    // Sidebar Toggle for Desktop and Mobile
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const windowWidth = window.innerWidth;

        if (windowWidth <= 768) {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    // Close Sidebar (Mobile)
    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Submenu Toggle - FIXED VERSION FOR MOBILE
    function toggleSubmenu(event, element) {
        event.preventDefault();
        event.stopPropagation();

        const submenu = element.nextElementSibling;
        const allSubmenus = document.querySelectorAll('.submenu');
        const allDropdownLinks = document.querySelectorAll('.menu-link');

        allSubmenus.forEach(sub => {
            if (sub !== submenu) {
                sub.classList.remove('active');
            }
        });

        allDropdownLinks.forEach(link => {
            if (link !== element) {
                link.classList.remove('dropdown-open');
            }
        });

        submenu.classList.toggle('active');
        element.classList.toggle('dropdown-open');

        return false;
    }
  let currentStep = 1;

  function showStep(step) {
    $(".form-step").removeClass("active");
    $(`#step-${step}`).addClass("active");

    // Update Progress Indicators
    $(".step-indicator").removeClass("active completed");
    for (let i = 1; i <= 3; i++) {
        if (i < step) $(`#ind-${i}`).addClass("completed");
        if (i === step) $(`#ind-${i}`).addClass("active");
    }

    // Navigation Controls
    if (step > 1) {
        $("#prevBtn").css("display", "inline-flex");
    } else {
        $("#prevBtn").css("display", "none");
    }

    if (step < 3) {
        $("#nextBtn").css("display", "inline-flex");
        $("#submitBtn").css("display", "none");
    } else {
        $("#nextBtn").css("display", "none");
        $("#submitBtn").css("display", "inline-flex");
    }
    
    window.scrollTo(0, 0);
  }

  function changeStep(n) {
    if (n === 1 && !validateCurrentStep()) return false;
    currentStep += n;
    showStep(currentStep);
  }

  function validateCurrentStep() {
    let valid = true;
    $(`#step-${currentStep} [required]`).each(function() {
        if ($(this).val() === "" || $(this).val() === null) {
            $(this).css("border-color", "#e74c3c");
            valid = false;
        } else {
            $(this).css("border-color", "#e9ecef");
        }
    });
    if (!valid) swal("Wait!", "Please fill all required fields before proceeding.", "warning");
    return valid;
  }

  // Submit Logic
  function Add_Subscription(_this) {
    if (!validateCurrentStep()) return false;

    var fd = new FormData(document.getElementById('multistep-subscription-form'));

    fd.append('id', '');
    
    // Grab CKEditor content if available
    if (typeof CKEDITOR !== 'undefined') {
        fd.append('plan_desc', CKEDITOR.instances.plan_desc.getData());
    }

    $(_this).prop("disabled", true).html(`<span class="spinner-border spinner-border-sm"></span> Processing...`);

    $.ajax({
      method: "POST",
      url: "{% url 'Subscriptions_Ajax' %}", // UPDATE THIS TO YOUR SUBSCRIPTION URL
      data: fd,
      processData: false,
      contentType: false,
      success: function (response) {
        $(_this).prop("disabled", false).html(`<i class="fas fa-plus"></i> Add Subscription`);
        if (response.status == '1') {
          swal("Success!", response.msg, "success").then(() => {
            window.location.href = "{% url 'Subscriptions_List' %}"; 
          });
        } else {
          swal("Error", response.msg, "error");
        }
      }
    });
  }
</script>
</body>
</html>
