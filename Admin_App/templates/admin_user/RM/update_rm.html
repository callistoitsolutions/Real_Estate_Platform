{% include "admin_user/admin_header.html" %}
{% load static %}

<style>
  :root {
    --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    --danger-gradient: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
    --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    --info-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    --sidebar-width: 280px;
    --sidebar-collapsed-width: 80px;
    --topbar-height: 70px;
  }

  /* --- Original Layout Styles --- */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); overflow-x: hidden; min-height: 100vh; }
  .main-content { margin-left: var(--sidebar-width); margin-top: var(--topbar-height); padding: 30px; min-height: calc(100vh - var(--topbar-height)); transition: all 0.3s ease; }
  .form-container { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); }
  .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
  
  /* --- Keeping Your Exact Back Button CSS --- */
  .btn-back {
    background: #f8f9fa;
    color: #2d3748;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn-back:hover { background: var(--dark-gradient); color: white; transform: translateY(-2px); }

  /* --- Multistep Progress Bar --- */
  .form-steps { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; max-width: 500px; margin-left: auto; margin-right: auto; }
  .form-steps::before { content: ""; position: absolute; top: 22px; left: 0; right: 0; height: 3px; background: #e9ecef; z-index: 1; }
  .step-indicator { position: relative; z-index: 2; background: white; width: 45px; height: 45px; border-radius: 50%; border: 3px solid #e9ecef; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #adb5bd; transition: all 0.3s ease; }
  .step-indicator.active { border-color: #667eea; color: #667eea; box-shadow: 0 0 10px rgba(102,126,234,0.2); }
  .step-indicator.completed { background: #667eea; border-color: #667eea; color: white; }
  
  .step-content { display: none; }
  .step-content.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .section-header { background: var(--primary-gradient); color: white; padding: 15px 20px; border-radius: 12px 12px 0 0; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
  .section-body { background: #f8f9fa; padding: 25px; border-radius: 0 0 12px 12px; border: 2px solid #e9ecef; border-top: none; }
  .form-label { font-weight: 600; color: #2d3748; margin-bottom: 8px; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
  .form-control { border: 2px solid #e9ecef; border-radius: 12px; padding: 12px 15px; font-size: 0.95rem; transition: all 0.3s ease; width: 100%; }
  .form-footer { margin-top: 30px; padding-top: 25px; border-top: 2px solid #f0f0f0; display: flex; gap: 15px; justify-content: flex-end; }
  .btn-submit { background: var(--primary-gradient); color: white; padding: 12px 35px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
  .btn-reset { background: #f8f9fa; color: #2d3748; padding: 12px 35px; border-radius: 12px; border: 2px solid #e9ecef; font-weight: 600; cursor: pointer; }

  .form-title { font-size: 1.5rem; font-weight: 700; color: #2d3748; display: flex; align-items: center; gap: 12px; }
  .form-title i { width: 45px; height: 45px; background: var(--primary-gradient); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
</style>

<div class="main-content">
  <div class="form-container">
    <div class="form-header">
      <div class="form-title"><i class="fas fa-edit"></i> Update Relationship Manager (RM)</div>
      <button class="btn-back" onclick="history.back();">
        <i class="fas fa-arrow-left"></i> Back to List
      </button>
    </div>

    <div class="form-steps">
      <div class="step-indicator active" id="ind_1">1</div>
      <div class="step-indicator" id="ind_2">2</div>
      <div class="step-indicator" id="ind_3">3</div>
    </div>

    <form method="POST" enctype="multipart/form-data" id="updateRmForm">
      {% csrf_token %}

      <div class="step-content active" id="step_1">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-user-tie"></i> Identity Details</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4 mt-2">
                <label class="form-label">Name <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="user_name" name="user_name" required value="{{rm.user_name}}">
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Email Address <span style="color:red;">*</span></label>
                <input type="email" class="form-control" id="user_email" name="user_email" required value="{{rm.user_email}}">
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Phone Number <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="user_phone" name="user_phone" maxlength="10" required value="{{rm.user_phone}}">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="step-content" id="step_2">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-map-marker-alt"></i> Location Information</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4 mt-2">
                <label class="form-label">State <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="user_state" name="user_state" required value="{{rm.user_state}}">
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">City <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="user_city" name="user_city" required value="{{rm.user_city}}">
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Address <span style="color:red;">*</span></label>
                <textarea class="form-control" id="user_address" name="user_address">{{rm.user_address}}</textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="step-content" id="step_3">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-shield-alt"></i> Account Security</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4 mt-2">
                <label class="form-label">Password <span style="color:red;">*</span></label>
                <input type="password" class="form-control" id="user_password" name="user_password" required value="{{rm.user_password}}">
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Confirm Password <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="user_com_password" name="user_com_password" required value="{{rm.user_password}}">
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Profile Picture</label>
                <input type="file" class="form-control" id="user_profile" name="user_profile">
                {% if rm.user_profile %}
                  <div class="mt-2"><a href="{{rm.user_profile.url}}" target="_blank">View Current Image</a></div>
                {% endif %}
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-md-4">
                <label class="form-label">Role</label>
                <input type="text" class="form-control" value="{{rm.user_role}}" disabled id="user_role">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="btn-reset" id="prevBtn" onclick="moveStep(-1)" style="display:none;">Previous</button>
        <button type="button" class="btn-submit" id="nextBtn" onclick="moveStep(1)">Next <i class="fas fa-arrow-right"></i></button>
        <button type="button" class="btn-submit" id="submitBtn" onclick="Update_RM(this)" style="display:none;">Update RM</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert/dist/sweetalert.min.js"></script>

<script>

  $("#Teams").addClass("active");

  // Sidebar Toggle for Desktop and Mobile
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const windowWidth = window.innerWidth;

    if (windowWidth <= 768) {
      sidebar.classList.toggle('active');
      overlay.classList.toggle('active');
      document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
    } else {
      sidebar.classList.toggle('collapsed');
    }
  }

  // Close Sidebar (Mobile)
  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  // Submenu Toggle - FIXED VERSION FOR MOBILE
  function toggleSubmenu(event, element) {
    event.preventDefault();
    event.stopPropagation();

    const submenu = element.nextElementSibling;
    const allSubmenus = document.querySelectorAll('.submenu');
    const allDropdownLinks = document.querySelectorAll('.menu-link');

    allSubmenus.forEach(sub => {
      if (sub !== submenu) {
        sub.classList.remove('active');
      }
    });

    allDropdownLinks.forEach(link => {
      if (link !== element) {
        link.classList.remove('dropdown-open');
      }
    });

    submenu.classList.toggle('active');
    element.classList.toggle('dropdown-open');

    return false;
  }



  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // Close sidebar on window resize
  window.addEventListener('resize', function () {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const windowWidth = window.innerWidth;

    if (windowWidth > 768) {
      sidebar.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  });

  // Handle clicks on submenu links and regular menu links
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.submenu-link').forEach(link => {
      link.addEventListener('click', function (e) {
        if (window.innerWidth <= 768) {
          setTimeout(() => {
            closeSidebar();
          }, 200);
        }
      });
    });

    document.querySelectorAll('.menu-link').forEach(link => {
      if (!link.hasAttribute('onclick')) {
        link.addEventListener('click', function (e) {
          if (window.innerWidth <= 768) {
            setTimeout(() => {
              closeSidebar();
            }, 200);
          }
        });
      }
    });
  });

  // Prevent body scroll when sidebar is open on mobile
  document.getElementById('sidebar').addEventListener('transitionend', function () {
    if (this.classList.contains('active')) {
      document.body.style.overflow = 'hidden';
    }
  });


  let currentStep = 1;

  function moveStep(n) {
    if (n === 1 && !validateStep(currentStep)) return false;

    $(`#step_${currentStep}`).removeClass('active');
    $(`#ind_${currentStep}`).removeClass('active');
    if (n === 1) $(`#ind_${currentStep}`).addClass('completed');

    currentStep += n;

    $(`#step_${currentStep}`).addClass('active');
    $(`#ind_${currentStep}`).addClass('active');

    // Button state logic
    $('#prevBtn').toggle(currentStep > 1);
    if (currentStep === 3) {
      $('#nextBtn').hide();
      $('#submitBtn').show();
    } else {
      $('#nextBtn').show();
      $('#submitBtn').hide();
    }
    window.scrollTo(0, 0);
  }

  function validateStep(step) {
    let valid = true;
    $(`#step_${step} [required]`).each(function() {
      if ($(this).val() === "") {
        $(this).css('border-color', 'red');
        valid = false;
      } else {
        $(this).css('border-color', '#e9ecef');
      }
    });
    return valid;
  }

  // Original Input Logic
  document.getElementById("user_name").addEventListener("input", function() {
    this.value = this.value.replace(/[^a-zA-Z ]/g, "");
  });
  document.getElementById("user_phone").addEventListener("input", function() {
    this.value = this.value.replace(/\D/g, "").slice(0, 10);
  });

  // Original AJAX logic for Updating
  function Update_RM(_this) {
    var user_name = $("#user_name").val();
    var user_email = $("#user_email").val();
    var user_phone = $("#user_phone").val();
    var user_state = $("#user_state").val();
    var user_city = $("#user_city").val();
    var user_address = $("#user_address").val();
    var user_password = $("#user_password").val();
    var user_com_password = $("#user_com_password").val();
    var user_profile = $("#user_profile")[0].files;
    var user_role = $("#user_role").val();

    if (user_password !== user_com_password) {
      swal("Error", "Passwords do not match", "error");
      return;
    }

    var fd = new FormData();
    fd.append('id', '{{rm.id}}');
    fd.append('user_name', user_name);
    fd.append('user_email', user_email);
    fd.append('user_phone', user_phone);
    fd.append('user_state', user_state);
    fd.append('user_city', user_city);
    fd.append('user_address', user_address);
    fd.append('user_password', user_password);
    fd.append('user_profile', user_profile[0]);
    fd.append('user_role', user_role);

    $(_this).prop("disabled", true);
    _this.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Updating...`;

    $.ajax({
      method: "POST",
      url: "{% url 'User_Ajax' %}",
      data: fd,
      processData: false,
      contentType: false,
      success: function (response) {
        $(_this).prop("disabled", false);
        _this.innerHTML = `<i class="fas fa-save mr-1"></i> Update RM`;
        if (response.status == '1') {
          swal("Success!", response.msg, "success").then(() => {
            window.location.href = "{% url 'rm_list' %}";
          });
        } else {
          swal("Error", response.msg, "error");
        }
      }
    });
  }
</script>
