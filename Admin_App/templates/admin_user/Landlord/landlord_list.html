    <script>

        // Function to check upload file type

        function checkSelectedFileSize(_this)
		{
			var ext_arr = ['xlsx'];
			var f = _this.files[0];
			var sizeInMb = f.size/1024;
			var sizeLimit= 1024*2;
			var filename = f.name;
			var ext = (/[.]/.exec(filename)) ? /[^.]+$/.exec(filename) : undefined;
			
			if (!ext_arr.includes(ext[0]))
			{
				alert("Please Upload only .xlsx file");
				_this.value = '';
				return false;
			}
		}
        
        // Sidebar Toggle for Desktop and Mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const windowWidth = window.innerWidth;

            if (windowWidth <= 768) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        // Close Sidebar (Mobile)
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Submenu Toggle - FIXED VERSION FOR MOBILE
        function toggleSubmenu(event, element) {
            event.preventDefault();
            event.stopPropagation();
            
            const submenu = element.nextElementSibling;
            const allSubmenus = document.querySelectorAll('.submenu');
            const allDropdownLinks = document.querySelectorAll('.menu-link');
            
            allSubmenus.forEach(sub => {
                if (sub !== submenu) {
                    sub.classList.remove('active');
                }
            });

            allDropdownLinks.forEach(link => {
                if (link !== element) {
                    link.classList.remove('dropdown-open');
                }
            });
            
            submenu.classList.toggle('active');
            element.classList.toggle('dropdown-open');
            
            return false;
        }

                scales: {

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Close sidebar on window resize
        window.addEventListener('resize', function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const windowWidth = window.innerWidth;

            if (windowWidth > 768) {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // Handle clicks on submenu links and regular menu links
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.submenu-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    if (window.innerWidth <= 768) {
                        setTimeout(() => {
                            closeSidebar();
                        }, 200);
                    }
                });
            });

            document.querySelectorAll('.menu-link').forEach(link => {
                if (!link.hasAttribute('onclick')) {
                    link.addEventListener('click', function(e) {
                        if (window.innerWidth <= 768) {
                            setTimeout(() => {
                                closeSidebar();
                            }, 200);
                        }
                    });
                }
            });
        });

        // Prevent body scroll when sidebar is open on mobile
        document.getElementById('sidebar').addEventListener('transitionend', function() {
            if (this.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            }
        });
    </script>


    {% comment %} Ajax Jquery and Javascript for delete landlords {% endcomment %}

<script>


    function Delete_Landlord(landlord_id)
    {
        swal({
            title: "DELETE",
            text: "Are you sure, you want to delete the landlords detail ?",
            icon: "warning",
            buttons: ["No", "Yes"],	
            closeOnClickOutside: false,
            dangerMode: true,
        })
        .then((willUpdate) => {
            if (willUpdate) 
            {	
                $.ajax({
                    type:"POST",
                    url: "{% url 'Delete_Landlord' %}",
                    data: {'landlord_id' : landlord_id},
                    success: function (response) 
                    {
                        if (response.status == '1'){
                            swal(""+response.msg+"", { 
                                icon: "success",
                                button: "Ok",
                                closeOnClickOutside: false,
                            }).then((addcat)=>{
                                location.reload();
                            });
                        }
                        else{
                            swal(""+response.msg+"", {
                            icon: "info",
                            button: "Ok",
                            closeOnClickOutside: false,
                            });
                        }
                    }
                    
                })
            }
        });
    }
</script>

<script>

    {% comment %} Ajax and Jquery to upload landlord data {% endcomment %}

    function Import_Landlord_Data(_this) {

        var landlord_file = $("#landlord_file")[0].files;

        if (landlord_file.length == 0) {
            alert("Please Upload Excel File");

        }


        else {
            var fd = new FormData();
            fd.append('landlord_file', landlord_file[0]);

            $(_this).prop("disabled", true);
            _this.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Loading...`;
            $.ajax({
                method: "POST",
                url: "{% url 'Landlord_Data' %}",
                enctype: "mutipart/form_data",
                processData: false,
                contentType: false,
                cache: false,
                data: fd,
                mode: 'same-origin',
                success: function (response) {
                    $(_this).prop("disabled", false);
                    _this.innerHTML = `Upload`;
                    if (response.status == '1') {
                        swal({
                            title: response.msg,
                            icon: 'success',
                            allowOutsideClick: false,
                            showCancelButton: false,
                            confirmButtonColor: '#3085d6',
                            confirmButtonText: 'Thank You!',
                        }).then((result) => {
                            if (result) {
                                window.location.href = "{% url 'Landlord_List' %}"
                            }
                        })
                    }
                    else {
                        swal({
                            title: response.msg,
                            icon: 'error',
                            showCancelButton: true,
                            cancelButtonColor: '#d33',
                            showConfirmButton: false,
                            allowOutsideClick: false
                        })
                    }
                }
            });
        }
    }    
</script>
