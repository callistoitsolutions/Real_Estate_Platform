{% include "admin_user/admin_header.html" %}
{% load static %}

<style>
  :root {
    --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    --sidebar-width: 280px;
    --topbar-height: 70px;
  }

  /* --- Original Layout Styles --- */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); overflow-x: hidden; min-height: 100vh; }
  .main-content { margin-left: var(--sidebar-width); margin-top: var(--topbar-height); padding: 30px; transition: all 0.3s ease; }
  .form-container { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); }
  .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
  
  /* --- Keeping Your Exact Back Button CSS --- */
  .btn-back {
    background: #f8f9fa;
    color: #2d3748;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn-back:hover { background: var(--dark-gradient); color: white; transform: translateY(-2px); }

  /* --- Multi-step Horizontal Tracker --- */
  .step-progress-bar { display: flex; justify-content: space-between; align-items: center; margin: 0 auto 40px; position: relative; max-width: 600px; }
  .step-progress-bar::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: #e9ecef; transform: translateY(-50%); z-index: 1; }
  .step-indicator { position: relative; z-index: 2; width: 45px; height: 45px; background: white; border: 3px solid #e9ecef; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #adb5bd; transition: all 0.3s ease; }
  .step-indicator.active { border-color: #667eea; color: #667eea; transform: scale(1.1); box-shadow: 0 0 15px rgba(102, 126, 234, 0.2); }
  .step-indicator.completed { background: #667eea; border-color: #667eea; color: white; }
  
  .form-step { display: none; }
  .form-step.active { display: block; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section-header { background: var(--primary-gradient); color: white; padding: 15px 20px; border-radius: 12px 12px 0 0; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
  .section-body { background: #f8f9fa; padding: 25px; border-radius: 0 0 12px 12px; border: 2px solid #e9ecef; border-top: none; }
  .form-label { font-weight: 600; color: #2d3748; margin-bottom: 8px; font-size: 0.9rem; }
  .form-control { border: 2px solid #e9ecef; border-radius: 12px; padding: 12px 15px; font-size: 0.95rem; transition: all 0.3s ease; width: 100%; }

  .form-footer { margin-top: 30px; padding-top: 25px; border-top: 2px solid #f0f0f0; display: flex; gap: 15px; justify-content: flex-end; }
  .btn-submit, .btn-next { background: var(--primary-gradient); color: white; padding: 12px 35px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
  .btn-prev { background: #f8f9fa; color: #2d3748; padding: 12px 35px; border-radius: 12px; border: 2px solid #e9ecef; font-weight: 600; cursor: pointer; }

  .form-title { font-size: 1.5rem; font-weight: 700; color: #2d3748; display: flex; align-items: center; gap: 12px; }
  .form-title i { width: 45px; height: 45px; background: var(--primary-gradient); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
</style>

<div class="main-content">
  <div class="form-container">
    <div class="form-header">
      <div class="form-title"><i class="fas fa-edit"></i> Update Vendors</div>
      <button class="btn-back" onclick="history.back();"><i class="fas fa-arrow-left"></i> Back to List</button>
    </div>

    <div class="step-progress-bar">
      <div class="step-indicator active" id="ind-1">1</div>
      <div class="step-indicator" id="ind-2">2</div>
      <div class="step-indicator" id="ind-3">3</div>
      <div class="step-indicator" id="ind-4">4</div>
    </div>

    <form method="POST" enctype="multipart/form-data" id="multistep-vendor-form">
      {% csrf_token %}

      <div class="form-step active" id="step-1">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-user-tie"></i> Step 1: Identity Information</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4 mt-2">
                <label class="form-label">Name <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="user_name" name="user_name" value="{{vendor.user_name}}" required>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Email <span style="color:red;">*</span></label>
                <input type="email" class="form-control" id="user_email" name="user_email" value="{{vendor.user_email}}" required>
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Phone <span style="color:red;">*</span></label>
                <input type="text" class="form-control" id="user_phone" name="user_phone" value="{{vendor.user_phone}}" maxlength="10" required>
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-md-6">
                <label class="form-label">Password <span style="color:red;">*</span></label>
                <input type="password" class="form-control" id="user_password" name="user_password" value="{{vendor.user_password}}" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm Password <span style="color:red;">*</span></label>
                <input type="password" class="form-control" id="user_com_password" value="{{vendor.user_password}}" required>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-step" id="step-2">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-map-marked-alt"></i> Step 2: Location Details</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4">
                <label class="form-label">State</label>
                <input type="text" class="form-control" id="user_state" name="user_state" value="{{vendor.user_state}}">
              </div>
              <div class="col-md-4">
                <label class="form-label">City</label>
                <input type="text" class="form-control" id="user_city" name="user_city" value="{{vendor.user_city}}">
              </div>
              <div class="col-md-4 mt-2">
                <label class="form-label">Address <span style="color:red;">*</span></label>
                <textarea class="form-control" placeholder="Enter Address" id="user_address" name="user_address">{{vendor.user_address}}</textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-step" id="step-3">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-briefcase"></i> Step 3: Business & Profile</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-4">
                <label class="form-label">Service Type</label>
                <select class="form-control" id="user_service_type" name="user_service_type">
                  <option value="SelectService" disabled>Select Service...</option>
                  {% for service in services_obj %}
                  <option value="{{service.service_name}}" {% if vendor.user_service_type == service.service_name %}selected{% endif %}>{{service.service_name}}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Company Name</label>
                <input type="text" class="form-control" id="user_company_name" name="user_company_name" value="{{vendor.user_company_name}}">
              </div>
              <div class="col-md-4">
                <label class="form-label">PAN Number</label>
                <input type="text" class="form-control" id="user_pan_number" name="user_pan_number" value="{{vendor.user_pan_number}}">
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-md-4">
                <label class="form-label">GSTIN Number</label>
                <input type="text" class="form-control" id="user_gstin_number" name="user_gstin_number" value="{{vendor.user_gstin_number}}">
              </div>
              <div class="col-md-4">
                <label class="form-label">Profile Picture</label>
                <input type="file" class="form-control" id="user_profile">
                {% if vendor.user_profile %}
                <small class="text-success">Current: <a href="{{vendor.user_profile.url}}" target="_blank">View File</a></small>
                {% endif %}
              </div>
              <div class="col-md-4">
                <label class="form-label">Role</label>
                <input type="text" class="form-control" id="user_role" value="Vendor" disabled>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-step" id="step-4">
        <div class="form-section">
          <div class="section-header"><i class="fas fa-map-signs"></i> Step 4: Operational Areas</div>
          <div class="section-body">
            <div class="row">
              <div class="col-md-12">
                <label class="form-label">Scope</label>
                <select class="form-control" id="user_operational_scope" onchange="handleScopeChange()">
                  <option value="all" {% if vendor.user_operational_scope == 'all' or not vendor.id %}selected{% endif %}>All Over India</option>
                  <option value="other" {% if vendor.user_operational_scope == 'other' %}selected{% endif %}>Other (Select Specific Regions)</option>
                </select>
              </div>
              <div class="col-md-12 mt-3" id="state_selection_container" style="display: none;">
                <div class="d-flex justify-content-between mb-2">
                    <label><strong>Select States</strong></label>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleAllBoxes()">Toggle All</button>
                </div>
                <div class="card p-3" style="max-height: 300px; overflow-y: auto;">
                    <div class="row" id="region_list_row"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button type="button" class="btn-prev" id="prevBtn" onclick="changeStep(-1)" style="display:none;">Previous</button>
        <button type="button" class="btn-next" id="nextBtn" onclick="changeStep(1)">Next Step <i class="fas fa-arrow-right"></i></button>
        <button type="button" class="btn-submit" id="submitBtn" onclick="Update_Vendor(this)" style="display:none;"><i class="fas fa-save"></i> Update Vendor</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<script>

  $("#Teams").addClass("active");

  // Sidebar Toggle for Desktop and Mobile
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const windowWidth = window.innerWidth;

    if (windowWidth <= 768) {
      sidebar.classList.toggle('active');
      overlay.classList.toggle('active');
      document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
    } else {
      sidebar.classList.toggle('collapsed');
    }
  }

  // Close Sidebar (Mobile)
  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  // Submenu Toggle - FIXED VERSION FOR MOBILE
  function toggleSubmenu(event, element) {
    event.preventDefault();
    event.stopPropagation();

    const submenu = element.nextElementSibling;
    const allSubmenus = document.querySelectorAll('.submenu');
    const allDropdownLinks = document.querySelectorAll('.menu-link');

    allSubmenus.forEach(sub => {
      if (sub !== submenu) {
        sub.classList.remove('active');
      }
    });

    allDropdownLinks.forEach(link => {
      if (link !== element) {
        link.classList.remove('dropdown-open');
      }
    });

    submenu.classList.toggle('active');
    element.classList.toggle('dropdown-open');

    return false;
  }



  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // Close sidebar on window resize
  window.addEventListener('resize', function () {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const windowWidth = window.innerWidth;

    if (windowWidth > 768) {
      sidebar.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  });

  // Handle clicks on submenu links and regular menu links
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.submenu-link').forEach(link => {
      link.addEventListener('click', function (e) {
        if (window.innerWidth <= 768) {
          setTimeout(() => {
            closeSidebar();
          }, 200);
        }
      });
    });

    document.querySelectorAll('.menu-link').forEach(link => {
      if (!link.hasAttribute('onclick')) {
        link.addEventListener('click', function (e) {
          if (window.innerWidth <= 768) {
            setTimeout(() => {
              closeSidebar();
            }, 200);
          }
        });
      }
    });
  });

  // Prevent body scroll when sidebar is open on mobile
  document.getElementById('sidebar').addEventListener('transitionend', function () {
    if (this.classList.contains('active')) {
      document.body.style.overflow = 'hidden';
    }
  });


  let currentStep = 1;

  function showStep(step) {
    $(".form-step").removeClass("active");
    $(`#step-${step}`).addClass("active");

    $(".step-indicator").removeClass("active completed");
    for (let i = 1; i <= 4; i++) {
        if (i < step) $(`#ind-${i}`).addClass("completed");
        if (i === step) $(`#ind-${i}`).addClass("active");
    }

    $("#prevBtn").toggle(step > 1);
    $("#nextBtn").toggle(step < 4);
    $("#submitBtn").toggle(step === 4);
    window.scrollTo(0, 0);
  }

  function changeStep(n) {
    if (n === 1 && !validateCurrentStep()) return false;
    currentStep += n;
    showStep(currentStep);
  }

  function validateCurrentStep() {
    let valid = true;
    $(`#step-${currentStep} [required]`).each(function() {
        if ($(this).val() === "" || $(this).val() === null) {
            $(this).css("border-color", "#e74c3c");
            valid = false;
        } else {
            $(this).css("border-color", "#e9ecef");
        }
    });
    if (!valid) swal("Wait!", "Please fill all required fields.", "warning");
    return valid;
  }

  // --- Operational Area Logic ---
  const savedRegions = "{{ vendor.selected_regions|safe }}".split(',').map(s => s.trim());
  const indiaRegions = ["Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", "Telangana", "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Andaman and Nicobar Islands", "Chandigarh", "Dadra and Nagar Haveli and Daman and Diu", "Lakshadweep", "Delhi", "Puducherry", "Ladakh", "Jammu and Kashmir"];

  function populateRegions() {
    const container = document.getElementById('region_list_row');
    indiaRegions.sort().forEach(region => {
      const id = region.replace(/\s+/g, '-').toLowerCase();
      const isChecked = savedRegions.includes(region) ? "checked" : "";
      const col = `<div class="col-md-4 mb-2"><div class="form-check"><input class="form-check-input region-checkbox" type="checkbox" value="${region}" id="check_${id}" ${isChecked}><label class="form-check-label" for="check_${id}" style="cursor:pointer">${region}</label></div></div>`;
      $(container).append(col);
    });
  }

  function handleScopeChange() {
    const scope = $("#user_operational_scope").val();
    if (scope === 'other') {
      $("#state_selection_container").fadeIn();
    } else {
      $("#state_selection_container").fadeOut();
    }
  }

  function toggleAllBoxes() {
    const anyUnchecked = $(".region-checkbox:not(:checked)").length > 0;
    $(".region-checkbox").prop('checked', anyUnchecked);
  }

  // Identity Input Restrictions
  document.getElementById("user_name").addEventListener("input", function() { this.value = this.value.replace(/[^a-zA-Z ]/g, ""); });
  document.getElementById("user_phone").addEventListener("input", function() { this.value = this.value.replace(/\D/g, "").slice(0, 10); });

  // --- Original AJAX Logic ---
  function Update_Vendor(_this) {
    var user_password = $("#user_password").val();
    var user_com_password = $("#user_com_password").val();

    if (user_password != user_com_password) {
      alert("Passwords do not match");
      return;
    }

    var fd = new FormData();
    fd.append('id', '{{vendor.id}}');
    fd.append('user_name', $("#user_name").val());
    fd.append('user_email', $("#user_email").val());
    fd.append('user_phone', $("#user_phone").val());
    fd.append('user_state', $("#user_state").val());
    fd.append('user_city', $("#user_city").val());
    fd.append('user_address', $("#user_address").val());
    fd.append('user_password', user_password);
    fd.append('user_profile', $("#user_profile")[0].files[0]);
    fd.append('user_role', "Vendor");
    fd.append('user_service_type', $("#user_service_type").val());
    fd.append('user_company_name', $("#user_company_name").val());
    fd.append('user_pan_number', $("#user_pan_number").val());
    fd.append('user_gstin_number', $("#user_gstin_number").val());
    fd.append('user_operational_scope', $("#user_operational_scope").val());

    if ($("#user_operational_scope").val() === 'all') {
        fd.append('selected_regions', 'ALL_INDIA');
    } else {
        var selectedRegions = [];
        $(".region-checkbox:checked").each(function() { selectedRegions.push($(this).val()); });
        if (selectedRegions.length === 0) {
            alert("Please select at least one state.");
            return;
        }
        fd.append('selected_regions', JSON.stringify(selectedRegions));
    }

    $(_this).prop("disabled", true).html(`<span class="spinner-border spinner-border-sm"></span> Updating...`);

    $.ajax({
      method: "POST",
      url: "{% url 'User_Ajax' %}",
      data: fd,
      processData: false,
      contentType: false,
      success: function (response) {
        $(_this).prop("disabled", false).html(`<i class="fas fa-save"></i> Update Vendor`);
        if (response.status == '1') {
          swal({ title: response.msg, icon: 'success' }).then(() => {
            window.location.href = "{% url 'Vendor_List' %}";
          });
        } else {
          swal({ title: response.msg, icon: 'error' });
        }
      }
    });
  }

  $(document).ready(() => { populateRegions(); handleScopeChange(); });
</script>
