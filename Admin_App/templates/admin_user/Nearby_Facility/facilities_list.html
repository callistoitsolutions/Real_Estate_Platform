{% include "admin_user/admin_header.html" %}
{% load static %}

<!-- Main Content -->
<div class="main-content">
    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title"><i class="fas fa-search-location"></i> Nearby Facilities Listings</h1>
            <div class="page-actions">
                <button class="btn-primary-custom" data-toggle="modal" data-target="#FacilitiesModalCenter">
                    <i class="fas fa-plus-circle"></i> Add Nearby Facilities
                </button>
                <button class="btn-primary-custom"
                    style="background: transparent; border: 2px solid white; color: white;" data-toggle="modal"
                    data-target="#exampleModalCenter">
                    <i class="fas fa-download"></i> Import Excel
                </button>
            </div>
        </div>
    </div>



    <!-- Quick Stats Section -->


    <!-- Properties Table -->
    <div class="properties-section">


        <!-- TABLE SCROLL AREA -->
        <div class="table-responsive">
            {{facilities_list}}
        </div>

    </div>

</div>
</div>


<!-- Modal -->
<div class="modal fade" id="FacilitiesModalCenter" tabindex="-1" role="dialog"
    aria-labelledby="FacilitiesModalCenterTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLongTitle">Nearby Facilities</h5>

            </div>
            <div class="modal-body">
                <div class="row">


                    <div class="col-md-12">
                        <div class="form-group">
                            <label class="form-label">
                                Facilities Icon <span style="color:red;">*</span>
                            </label>

                            <div class="input-group">
                                <input type="text" class="form-control amenity_icon" placeholder="e.g: fas fa-users"
                                    id="facilities_icon" name="facilities_icon">

                                <span class="input-group-text" style="width:50px; justify-content:center;">
                                    <i class="iconPreview"></i>
                                </span>
                            </div>

                        </div>
                    </div>

                    <div class="col-md-12 mt-2">
                        <div class="form-group">
                            <label class="form-label">
                                Facilities Name <span style="color:red;">*</span>
                            </label>

                            <div class="input-group">
                                <input type="text" class="form-control amenity_icon" placeholder="Enter Facilities Name"
                                    id="facilities_name" name="facilities_name">

                            </div>


                        </div>
                    </div>

                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" style="background-color:#667eea;"
                    onclick="Add_Facilities(this)"><i class="fas fa-add"></i> Add Facilities</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="exampleModalCenter" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLongTitle">Import Excel</h5>

            </div>
            <div class="modal-body">
                <div class="row">


                    <div class="col-md-12">
                        <div class="form-group">
                            <label class="form-label">Upload Facilities Data Excel File <span class="required"
                                    style="color:red;">*</span></label>
                            <input type="file" class="form-control" id="facilities_file" name="facilities_file"
                                placeholder="Enter Confirm Password" required onchange="checkSelectedFileSize(this)"
                                accept=".xlsx">
                        </div>
                    </div>

                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" style="background-color:#667eea;"
                    onclick="Import_Facilities_Data(this)">Upload</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

    $("#Facilities").addClass("active");

    document.querySelectorAll(".amenity_icon").forEach(function (input) {

        input.addEventListener("input", function () {

            let iconClass = this.value.trim();
            let previewContainer = this.closest(".input-group").querySelector(".iconPreview").parentElement;

            // remove old icon
            previewContainer.innerHTML = "";

            if (iconClass !== "") {
                let newIcon = document.createElement("i");
                newIcon.className = iconClass;
                newIcon.classList.add("iconPreview");

                previewContainer.appendChild(newIcon);
            }

        });

    });

    // Function to check upload file type

    function checkSelectedFileSize(_this) {
        var ext_arr = ['xlsx'];
        var f = _this.files[0];
        var sizeInMb = f.size / 1024;
        var sizeLimit = 1024 * 2;
        var filename = f.name;
        var ext = (/[.]/.exec(filename)) ? /[^.]+$/.exec(filename) : undefined;

        if (!ext_arr.includes(ext[0])) {
            alert("Please Upload only .xlsx file");
            _this.value = '';
            return false;
        }
    }

    // Sidebar Toggle for Desktop and Mobile
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const windowWidth = window.innerWidth;

        if (windowWidth <= 768) {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    // Close Sidebar (Mobile)
    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Submenu Toggle - FIXED VERSION FOR MOBILE
    function toggleSubmenu(event, element) {
        event.preventDefault();
        event.stopPropagation();

        const submenu = element.nextElementSibling;
        const allSubmenus = document.querySelectorAll('.submenu');
        const allDropdownLinks = document.querySelectorAll('.menu-link');

        allSubmenus.forEach(sub => {
            if (sub !== submenu) {
                sub.classList.remove('active');
            }
        });

        allDropdownLinks.forEach(link => {
            if (link !== element) {
                link.classList.remove('dropdown-open');
            }
        });

        submenu.classList.toggle('active');
        element.classList.toggle('dropdown-open');

        return false;
    }

    // PIE CHART - Property Distribution
    const pieCtx = document.getElementById('propertyPieChart').getContext('2d');
    const propertyPieChart = new Chart(pieCtx, {
        type: 'pie',
        data: {
            labels: ['Residential', 'Commercial', 'PG/Co-living'],
            datasets: [{
                data: [32, 12, 4],
                backgroundColor: [
                    'rgba(102, 126, 234, 0.8)',
                    'rgba(245, 87, 108, 0.8)',
                    'rgba(79, 172, 254, 0.8)'
                ],
                borderColor: [
                    'rgba(102, 126, 234, 1)',
                    'rgba(245, 87, 108, 1)',
                    'rgba(79, 172, 254, 1)'
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        usePointStyle: true,
                        padding: 15,
                        font: {
                            family: 'Poppins',
                            size: 11
                        }
                    }
                },
                tooltip: {
                    callbacks: {
                        label: function (context) {
                            let label = context.label || '';
                            if (label) {
                                label += ': ';
                            }
                            label += context.parsed + ' properties';
                            return label;
                        }
                    }
                }
            }
        }
    });

    // BAR CHART - Monthly Rental Income
    const barCtx = document.getElementById('rentalIncomeChart').getContext('2d');
    const rentalIncomeChart = new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
            datasets: [{
                label: 'Rental Income (₹L)',
                data: [9.5, 10.2, 11.5, 10.8, 11.8, 12.2, 12.5, 13.0, 11.9, 12.3, 12.8, 12.5],
                backgroundColor: 'rgba(102, 126, 234, 0.7)',
                borderColor: 'rgba(102, 126, 234, 1)',
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: {
                        color: '#f3f4f6'
                    },
                    ticks: {
                        font: {
                            size: 10
                        },
                        callback: function (value) {
                            return '₹' + value + 'L';
                        }
                    }
                },
                x: {
                    grid: {
                        display: false
                    },
                    ticks: {
                        font: {
                            size: 10
                        }
                    }
                }
            }
        }
    });

    // DOUGHNUT CHART - Occupancy Status
    const doughnutCtx = document.getElementById('occupancyDoughnutChart').getContext('2d');
    const occupancyDoughnutChart = new Chart(doughnutCtx, {
        type: 'doughnut',
        data: {
            labels: ['Occupied', 'Vacant', 'Under Maintenance'],
            datasets: [{
                data: [38, 6, 4],
                backgroundColor: [
                    'rgba(16, 185, 129, 0.8)',
                    'rgba(251, 191, 36, 0.8)',
                    'rgba(239, 68, 68, 0.8)'
                ],
                borderColor: [
                    'rgba(16, 185, 129, 1)',
                    'rgba(251, 191, 36, 1)',
                    'rgba(239, 68, 68, 1)'
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        usePointStyle: true,
                        padding: 15,
                        font: {
                            family: 'Poppins',
                            size: 11
                        }
                    }
                },
                tooltip: {
                    callbacks: {
                        label: function (context) {
                            let label = context.label || '';
                            if (label) {
                                label += ': ';
                            }
                            label += context.parsed + ' properties';
                            return label;
                        }
                    }
                }
            }
        }
    });

    // BAR CHART - Rent Range Distribution
    const rentCtx = document.getElementById('rentRangeChart').getContext('2d');
    const rentRangeChart = new Chart(rentCtx, {
        type: 'bar',
        data: {
            labels: ['<10K', '10-20K', '20-30K', '30-40K', '40-50K', '>50K'],
            datasets: [{
                label: 'Properties',
                data: [8, 14, 12, 8, 4, 2],
                backgroundColor: [
                    'rgba(102, 126, 234, 0.7)',
                    'rgba(79, 172, 254, 0.7)',
                    'rgba(67, 233, 123, 0.7)',
                    'rgba(250, 112, 154, 0.7)',
                    'rgba(251, 191, 36, 0.7)',
                    'rgba(139, 92, 246, 0.7)'
                ],
                borderColor: [
                    'rgba(102, 126, 234, 1)',
                    'rgba(79, 172, 254, 1)',
                    'rgba(67, 233, 123, 1)',
                    'rgba(250, 112, 154, 1)',
                    'rgba(251, 191, 36, 1)',
                    'rgba(139, 92, 246, 1)'
                ],
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: {
                        color: '#f3f4f6'
                    },
                    ticks: {
                        font: {
                            size: 10
                        }
                    }
                },
                x: {
                    grid: {
                        display: false
                    },
                    ticks: {
                        font: {
                            size: 10
                        }
                    }
                }
            }
        }
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    // Close sidebar on window resize
    window.addEventListener('resize', function () {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const windowWidth = window.innerWidth;

        if (windowWidth > 768) {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    // Handle clicks on submenu links and regular menu links
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.submenu-link').forEach(link => {
            link.addEventListener('click', function (e) {
                if (window.innerWidth <= 768) {
                    setTimeout(() => {
                        closeSidebar();
                    }, 200);
                }
            });
        });

        document.querySelectorAll('.menu-link').forEach(link => {
            if (!link.hasAttribute('onclick')) {
                link.addEventListener('click', function (e) {
                    if (window.innerWidth <= 768) {
                        setTimeout(() => {
                            closeSidebar();
                        }, 200);
                    }
                });
            }
        });
    });

    // Prevent body scroll when sidebar is open on mobile
    document.getElementById('sidebar').addEventListener('transitionend', function () {
        if (this.classList.contains('active')) {
            document.body.style.overflow = 'hidden';
        }
    });
</script>


<script>

    {% comment %} Ajax and Jquery to add facilities {% endcomment %}


    function Add_Facilities(_this) {
        var facilities_icon = $("#facilities_icon").val();
        var facilities_name = $("#facilities_name").val();

        if (facilities_icon == '') {
            alert("Please Enter Facilities Icon");
        }
        else if (facilities_name == '') {
            alert("Please Enter Facilities Name");
        }
        else {
            var fd = new FormData();
            fd.append('id', '');
            fd.append('facilities_icon', facilities_icon);
            fd.append('facilities_name', facilities_name);

            $(_this).prop("disabled", true);
            _this.innerHTML = `<span class="spinner-border spinner-border-sm" role="status"></span> Adding...`;

            $.ajax({
                method: "POST",
                url: "{% url 'Facilities_Ajax' %}",
                enctype: "multipart/form-data",
                processData: false,
                contentType: false,
                cache: false,
                data: fd,
                mode: 'same-origin',
                success: function (response) {
                    $(_this).prop("disabled", false);
                    _this.innerHTML = `<i class="fas fa-add mr-1"></i> Add Facilities`;

                    if (response.status == '1') {
                        swal({
                            title: response.msg,
                            icon: 'success',
                            confirmButtonColor: '#3085d6',
                            confirmButtonText: 'OK',
                        }).then((result) => {
                            if (result) {
                                window.location.href = "{% url 'Facilities_List' %}"
                            }
                        })
                    } else {
                        swal({
                            title: response.msg,
                            icon: 'error',
                            showCancelButton: true,
                            cancelButtonColor: '#d33',
                            showConfirmButton: false,
                        })
                    }
                }
            });
        }
    }
</script>

<script>

    {% comment %} Ajax and Jquery to upload facilities data {% endcomment %}

    function Import_Facilities_Data(_this) {

        var facilities_file = $("#facilities_file")[0].files;

        if (facilities_file.length == 0) {
            alert("Please Upload Excel File");

        }


        else {
            var fd = new FormData();
            fd.append('facilities_file', facilities_file[0]);

            $(_this).prop("disabled", true);
            _this.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Loading...`;
            $.ajax({
                method: "POST",
                url: "{% url 'Facilities_Data' %}",
                enctype: "mutipart/form_data",
                processData: false,
                contentType: false,
                cache: false,
                data: fd,
                mode: 'same-origin',
                success: function (response) {
                    $(_this).prop("disabled", false);
                    _this.innerHTML = `Upload`;
                    if (response.status == '1') {
                        swal({
                            title: response.msg,
                            icon: 'success',
                            allowOutsideClick: false,
                            showCancelButton: false,
                            confirmButtonColor: '#3085d6',
                            confirmButtonText: 'Thank You!',
                        }).then((result) => {
                            if (result) {
                                window.location.href = "{% url 'Facilities_List' %}"
                            }
                        })
                    }
                    else {
                        swal({
                            title: response.msg,
                            icon: 'error',
                            showCancelButton: true,
                            cancelButtonColor: '#d33',
                            showConfirmButton: false,
                            allowOutsideClick: false
                        })
                    }
                }
            });
        }
    }    
</script>


{% comment %} Ajax Jquery and Javascript for delete facilities {% endcomment %}

<script>


    function Delete_Facilities(facilities_id)
    {
        swal({
            title: "DELETE",
            text: "Are you sure, you want to delete the facilities detail ?",
            icon: "warning",
            buttons: ["No", "Yes"],	
            closeOnClickOutside: false,
            dangerMode: true,
        })
        .then((willUpdate) => {
            if (willUpdate) 
            {	
                $.ajax({
                    type:"POST",
                    url: "{% url 'Delete_Facilities' %}",
                    data: {'facilities_id' : facilities_id},
                    success: function (response) 
                    {
                        if (response.status == '1'){
                            swal(""+response.msg+"", { 
                                icon: "success",
                                button: "Ok",
                                closeOnClickOutside: false,
                            }).then((addcat)=>{
                                location.reload();
                            });
                        }
                        else{
                            swal(""+response.msg+"", {
                            icon: "info",
                            button: "Ok",
                            closeOnClickOutside: false,
                            });
                        }
                    }
                    
                })
            }
        });
    }
</script>
